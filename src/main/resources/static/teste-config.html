<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Configuração - Oriente.se</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .bg-dark-card { background-color: #161b2a; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
    </style>
</head>
<body class="text-slate-100 p-8">

<div class="max-w-2xl mx-auto">
    <div class="bg-dark-card rounded-2xl p-8 border border-white/10">
        <h1 class="text-3xl font-bold mb-8">🧪 Teste de Configuração</h1>

        <div id="resultado" class="space-y-4">
            <p class="text-slate-500">Carregando configurações...</p>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    const resultado = document.getElementById('resultado');
    let html = '';

    // Verificar CONFIG
    if (window.CONFIG) {
        html += '<div class="success"><strong>✓ CONFIG encontrado</strong></div>';
        html += `<pre class="bg-[#0b0f19] p-4 rounded border border-white/10 text-xs overflow-auto">
${JSON.stringify(window.CONFIG, null, 2)}
        </pre>`;
    } else {
        html += '<div class="error"><strong>✗ CONFIG não encontrado</strong></div>';
    }

    // Verificar API_BASE_URL
    const apiUrl = window.CONFIG?.API_BASE_URL;
    if (apiUrl) {
        html += `<div class="info"><strong>API Base URL:</strong> ${apiUrl}</div>`;
    } else {
        html += '<div class="error"><strong>✗ API_BASE_URL não configurado</strong></div>';
    }

    // Verificar ambiente
    const env = window.CONFIG?.isProduction ? 'PRODUÇÃO' : 'DESENVOLVIMENTO';
    html += `<div class="info"><strong>Ambiente:</strong> ${env}</div>`;

    // Testar requisição
    html += '<div class="mt-8 pt-8 border-t border-white/10"><h2 class="font-bold mb-4">Teste de Conectividade</h2>';

    fetch(`${apiUrl}/api/roteiros/`, {
        method: 'GET',
        headers: { 'Authorization': 'Bearer teste' }
    })
    .then(res => {
        html += `<div class="info">Status: ${res.status}</div>`;
        resultado.innerHTML = html;
    })
    .catch(err => {
        html += `<div class="error">Erro: ${err.message}</div>`;
        resultado.innerHTML = html;
    });

    resultado.innerHTML = html;
</script>

</body>
</html>
