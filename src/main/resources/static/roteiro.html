<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriente.se | Detalhes do Roteiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icone_orientese-32x32.png">
    <link rel="shortcut icon" href="assets/icone_orientese.ico" type="image/x-icon">
    <style>
        .conteudo-quill a {
            color: #ec4899;
            text-decoration: underline;
            text-underline-offset: 4px;
            font-weight: 700;
            transition: color 0.2s ease-in-out;
            cursor: pointer;
        }

        .conteudo-quill a:hover {
            color: #f472b6;
        }

        .conteudo-quill strong { font-weight: bold; color: #f8fafc; }
        .conteudo-quill em { font-style: italic; }
    </style>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
        }

        .bg-dark-card {
            background-color: #161b2a;
        }
        .pdf-canvas { padding: 20px; background-color: #0b0f19 !important; }
    </style>
</head>
<body class="text-slate-100 antialiased">

<div class="w-full px-6 md:px-12 py-6">
    <header class="mb-10 border-b border-white/10 pb-8 flex justify-between items-center">
        <div>
            <span class="text-pink-500 font-bold tracking-[0.3em] uppercase text-[10px]">Sistema Interno</span>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white">
                Canal <span class="text-pink-500">Oriente.se</span>
            </h1>
        </div>
        <div class="flex gap-4">
            <button onclick="gerarPDF()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2">
                📥 Baixar PDF
            </button>
            <a href="novo-roteiro.html">
                <button class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all">
                    + Novo Roteiro
                </button>
            </a>
        </div>
    </header>

    <nav class="mb-8">
        <a href="index.html" class="text-slate-500 hover:text-pink-500 transition-colors text-sm font-bold uppercase tracking-widest inline-flex items-center gap-2">
            ← Voltar para a Galeria
        </a>
    </nav>

    <main class="flex h-[calc(100vh-150px)] gap-6 overflow-hidden">

        <section id="coluna-roteiro" class="w-full transition-all duration-500 ease-in-out overflow-y-auto pr-2 pb-20 bg-dark-card rounded-2xl p-8 border border-white/5 shadow-2xl">

            <div class="mb-8">
                <h2 id="titulo-roteiro" class="text-3xl md:text-4xl font-black tracking-tighter uppercase text-white mb-4">
                    Carregando...
                </h2>
                <div class="flex items-center gap-6">
                    <div>
                        <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest mb-1">Duração Estimada</p>
                        <p id="duracao-roteiro" class="text-2xl font-mono text-pink-500 font-bold">--:--</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-end mb-4 mt-8">
                <h3 class="text-slate-400 text-xs font-bold uppercase tracking-widest">Blocos do Roteiro</h3>
                <button onclick="abrirModalBloco()" class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded-lg font-bold text-xs transition-all flex items-center gap-2">
                    + Novo Bloco
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="text-slate-500 uppercase text-[10px] tracking-[0.2em] border-b border-white/10">
                        <th class="py-4 px-2 w-12">#</th>
                        <th class="py-4 px-2">Bloco/Dir. Visual</th>
                        <th class="py-4 px-2">Conteúdo</th>
                        <th class="py-4 px-2 text-right">Tempo</th>
                        <th class="py-4 px-2 w-32 text-right coluna-acoes">Ações</th>
                    </tr>
                    </thead>
                    <tbody id="container-blocos" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </section>

        <section id="painel-decupagem" class="w-0 opacity-0 translate-x-10 transition-all duration-500 ease-in-out bg-[#0f141f] rounded-2xl border border-pink-500/30 shadow-2xl flex flex-col hidden">

            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-[#161b2a] rounded-t-2xl">
                <div>
                    <span class="text-pink-500 text-[10px] font-bold tracking-widest uppercase">Decupagem</span>
                    <h2 id="titulo-painel-decupagem" class="text-lg font-bold text-white">Bloco Selecionado</h2>
                </div>

                <div class="flex gap-2 items-center">
                    <button onclick="alternarTelaCheiaDecupagem()" id="btn-expandir-decupagem" class="text-slate-400 hover:text-white transition-colors p-2" title="Expandir Tela">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </button>
                    <button onclick="fecharPainelDecupagem()" class="text-slate-400 hover:text-white transition-colors p-2" title="Fechar Painel">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>

            <div id="lista-mini-blocos" class="p-6 flex-1 overflow-y-auto space-y-4">
                <p class="text-slate-500 text-sm text-center italic mt-10">Clique em "+ Novo Trecho" para começar a decupar este bloco.</p>
            </div>

            <div class="p-6 border-t border-white/10 bg-[#161b2a] rounded-b-2xl flex gap-4">
                <button onclick="adicionarMiniBloco()" class="w-1/2 border border-pink-500 text-pink-500 hover:bg-pink-500 hover:text-white font-bold py-3 rounded-xl transition-all border-dashed">
                    + Novo Trecho
                </button>

                <button onclick="salvarDecupagem()" class="w-1/2 bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-pink-500/20 transition-all">
                    💾 Salvar Decupagem
                </button>
            </div>
        </section>

    </main>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
<div id="modal-bloco" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center z-50">
    <div class="bg-dark-card border border-white/10 rounded-2xl p-8 w-full max-w-2xl shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black italic uppercase text-white">Adicionar <span class="text-pink-500">Bloco</span></h3>
            <button onclick="fecharModalBloco()" class="text-slate-500 hover:text-white transition-colors text-2xl">&times;</button>
        </div>

        <form id="form-bloco" class="flex flex-col gap-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Duração (Min:Seg)</label>
                    <input type="text" id="input-duracao" placeholder="Ex: 01:30" class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-3 text-white font-mono text-sm focus:border-pink-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Título do Bloco</label>
                    <input type="text" id="input-titulo-bloco" class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-3 text-white text-sm focus:border-pink-500 outline-none">
                </div>
                <div>
                    <label class="block text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Direção Visual</label>
                    <input type="text" id="input-direcao" placeholder="Ex: Imagem do mapa" class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-3 text-white text-sm focus:border-pink-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Conteúdo do Bloco (Falas)</label>

                <div class="bg-white text-black rounded-lg overflow-hidden">
                    <div id="editor-quill" style="height: 150px;"></div>
                </div>

                <input type="hidden" id="input-conteudo">
            </div>

            <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-lg mt-2 tracking-widest uppercase text-sm transition-all shadow-lg shadow-pink-600/20">
                Salvar Bloco
            </button>
        </form>
    </div>
</div>
</body>
</html>
