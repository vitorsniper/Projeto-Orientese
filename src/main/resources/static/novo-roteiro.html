<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriente.se | Novo Roteiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .bg-dark-card { background-color: #161b2a; }
    </style>
</head>
<body class="text-slate-100 antialiased">

<div class="max-w-3xl mx-auto p-6 md:p-12">
    <header class="mb-10 border-b border-white/10 pb-8">
        <span class="text-pink-500 font-bold tracking-[0.3em] uppercase text-[10px]">Sistema Interno</span>
        <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white">
            Novo <span class="text-pink-500">Roteiro</span>
        </h1>
    </header>

    <nav class="mb-8">
        <a href="index.html" class="text-slate-500 hover:text-pink-500 transition-colors text-sm font-bold uppercase tracking-widest inline-flex items-center gap-2">
            ← Voltar para a Galeria
        </a>
    </nav>

    <form id="form-roteiro" onsubmit="criarRoteiro(event)" class="bg-dark-card rounded-2xl p-8 md:p-12 shadow-2xl border border-white/5 flex flex-col gap-6">
        <div>
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Título do Roteiro</label>
            <input type="text" id="input-titulo" placeholder="Ex: O Mistério de Tóquio" required
                   class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-4 text-white font-bold focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none transition-all">
        </div>

        <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-lg mt-6 tracking-widest uppercase transition-all shadow-lg shadow-pink-600/20">
            Salvar e Começar a Editar
        </button>
    </form>
</div>

<script src="js/config.js"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
