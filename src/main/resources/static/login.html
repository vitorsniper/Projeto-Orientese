<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriente.se | Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icone_orientese-32x32.png">
    <link rel="shortcut icon" href="assets/icone_orientese.ico" type="image/x-icon">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .bg-dark-card { background-color: #161b2a; }
    </style>
</head>
<body class="text-slate-100 antialiased h-screen flex items-center justify-center">

<div class="w-full max-w-md p-6">
    <div class="text-center mb-10">
        <span class="text-pink-500 font-bold tracking-[0.3em] uppercase text-[10px] block mb-2">Sistema Interno</span>
        <h1 class="text-4xl font-black tracking-tighter uppercase italic text-white">
            Oriente.<span class="text-pink-500">se</span>
        </h1>
    </div>

    <!-- Indicador de API -->
    <div id="api-status" class="mb-6 p-3 rounded-lg border text-xs text-center font-mono bg-blue-500/10 border-blue-500/30 text-blue-300">
        📡 API: <span id="api-url-display">Carregando...</span>
    </div>

    <form id="form-login" onsubmit="efetuarLogin(event)" class="bg-dark-card rounded-2xl p-8 shadow-2xl border border-white/5 flex flex-col gap-6">

        <div>
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Utilizador</label>
            <input type="text" id="input-login" placeholder="Ex: vitor" required
                   class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-4 text-white font-bold focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none transition-all">
        </div>

        <div>
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Palavra-passe</label>
            <input type="password" id="input-senha" placeholder="••••••••" required
                   class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-4 text-white font-bold focus:border-pink-500 focus:ring-1 focus:ring-pink-500 outline-none transition-all">
        </div>

        <button type="submit" class="bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-lg mt-4 tracking-widest uppercase transition-all shadow-lg shadow-pink-600/20">
            Entrar 🔑
        </button>

        <p id="mensagem-erro" class="text-red-500 text-sm text-center font-bold hidden">
            Utilizador ou palavra-passe incorretos.
        </p>
    </form>

    <!-- Seletor de API (para desenvolvimento) -->
    <div class="mt-6 pt-6 border-t border-white/10">
        <details class="text-xs text-slate-500">
            <summary class="cursor-pointer hover:text-slate-400 font-bold uppercase tracking-widest">
                ⚙️ Configurações Avançadas
            </summary>
            <div class="mt-4 space-y-3">
                <div>
                    <label class="block text-slate-400 text-xs font-bold uppercase mb-2">Selecionar API:</label>
                    <select id="api-select" class="w-full bg-[#0b0f19] border border-white/10 rounded-lg p-2 text-white text-xs">
                        <option value="https://api-orientese.onrender.com">🌐 Render (Produção)</option>
                        <option value="http://localhost:8080">💻 Local (Desenvolvimento)</option>
                    </select>
                </div>
                <button type="button" onclick="atualizarAPI()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 rounded transition-all">
                    Aplicar
                </button>
                <button type="button" onclick="resetarAPI()" class="w-full bg-slate-600 hover:bg-slate-700 text-white text-xs font-bold py-2 rounded transition-all">
                    Resetar
                </button>
            </div>
        </details>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    // Atualizar display da API
    document.getElementById('api-url-display').textContent = window.CONFIG.API_BASE_URL;
    document.getElementById('api-select').value = window.CONFIG.API_BASE_URL;

    function atualizarAPI() {
        const novaUrl = document.getElementById('api-select').value;
        window.CONFIG.setApiUrl(novaUrl);
        document.getElementById('api-url-display').textContent = novaUrl;
        alert(`✅ API alterada para: ${novaUrl}`);
    }

    function resetarAPI() {
        window.CONFIG.resetApiUrl();
    }
</script>
<script src="js/app.js"></script>
</body>
</html>
