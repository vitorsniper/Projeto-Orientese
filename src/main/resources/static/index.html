<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriente.se | Gestão de Roteiros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/icone_orientese-32x32.png">
    <link rel="shortcut icon" href="assets/icone_orientese.ico" type="image/x-icon">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
        }

        .bg-dark-card {
            background-color: #161b2a;
        }
    </style>
</head>
<body class="text-slate-100 antialiased">

<div class="max-w-7xl mx-auto p-6 md:p-12">
    <header class="mb-16 border-b border-white/10 pb-8 flex justify-between items-center">
        <div>
            <span class="text-pink-500 font-bold tracking-[0.3em] uppercase text-[10px]">Sistema Interno</span>
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white">
                Canal <span class="text-pink-500">Oriente.se</span>
            </h1>
        </div>
        <a href="novo-roteiro.html">
            <button class="bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded-lg font-bold text-sm transition-all">
                + Novo Roteiro
            </button>
        </a>
    </header>

    <main>
        <h2 class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mb-6">Roteiros em Produção</h2>

        <div id="container-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-slate-500 italic">Carregando roteiros...</p>
        </div>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
